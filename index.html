<!DOCTYPE html>
<html lang="en" data-theme="dark" data-scheme="default">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Genre Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap');
  [data-theme="dark"]{
    --bg:#0a0a0a;--surface:#111;--surface2:#181818;--border:#222;--border2:#333;
    --text:#e8e0d0;--text2:#b0a898;--muted:#555;--panel:#131313;
  }
  [data-theme="light"]{
    --bg:#f4f1eb;--surface:#fff;--surface2:#ece9e3;--border:#d8d2c8;--border2:#c8c0b4;
    --text:#1a1814;--text2:#5a5248;--muted:#999;--panel:#ffffff;
  }
  /* ── SCHEME OVERRIDES: these beat the theme because they're more specific ──
     Schemes that define bg/surface/border override both dark and light mode */

  /* ── DEFAULT: Dark studio, warm gold accents ── */
  [data-scheme="default"]{
    --accent:#e8c84a;
    --rock:#e05a3a;--electronic:#4a9ee8;--hiphop:#b05ae8;--jazz:#e8a43a;
    --folk:#6abf6a;--classical:#e8d08a;--rnb:#e8607a;--world:#4acfb0;
    --metal:#cf4a4a;--experimental:#c0c0c0;--pop:#e87ab0;
  }

  /* ── RETRO: Eggshell/cream bg, pinstripe warm palette — vintage campervan × PS1 ── */
  /* RETRO shared colors */
  html[data-scheme="retro"]{
    --accent:#c4500a;
    --rock:#c4380a;
    --electronic:#6b4fa8;
    --hiphop:#8b3a1e;
    --jazz:#a06010;
    --folk:#4a7a28;
    --classical:#b87820;
    --rnb:#a83030;
    --world:#2e6e58;
    --metal:#6e1a10;
    --experimental:#7a6848;
    --pop:#9c3050;
  }
  /* RETRO LIGHT — eggshell cream, vintage campervan */
  html[data-scheme="retro"][data-theme="light"]{
    --bg:#e8e0ce;
    --surface:#f0e8d6;
    --surface2:#ddd4c0;
    --border:#b8966a;
    --border2:#9a7a50;
    --text:#2a1f0e;
    --text2:#5c4428;
    --muted:#9a845e;
    --panel:#ede5d3;
  }
  /* RETRO DARK — dark walnut wood, warm amber text */
  html[data-scheme="retro"][data-theme="dark"]{
    --bg:#1a1008;
    --surface:#241608;
    --surface2:#2e1c0c;
    --border:#5a3a18;
    --border2:#7a4e24;
    --text:#e8d4a8;
    --text2:#c0a060;
    --muted:#7a5a30;
    --panel:#1e1208;
  }

  /* ── TERMINAL SCHEME — shared genre colors (all neon green variants) ── */
  html[data-scheme="terminal"]{
    --accent:#00ff41;
    --rock:#00e838;
    --electronic:#00cc33;
    --hiphop:#00ff41;
    --jazz:#00bb2d;
    --folk:#00dd38;
    --classical:#00ee40;
    --rnb:#00c830;
    --world:#00aa28;
    --metal:#00ff41;
    --experimental:#00cc33;
    --pop:#00ee3c;
  }
  /* TERMINAL — green on black */
  html[data-scheme="terminal"][data-theme="light"],
  html[data-scheme="terminal"][data-theme="dark"]{
    --bg:#000000;
    --surface:#040d04;
    --surface2:#000000;
    --border:#003b0a;
    --border2:#005c10;
    --text:#00ff41;
    --text2:#00aa2a;
    --muted:#006618;
    --tag-bg:#001a05;
    --tag-border:#005c10;
    --tag-text:#00cc33;
    --detail-bg:#000000;
    --detail-border:#00ff41;
  }
  /* Scanline overlay on entire page */
  html[data-scheme="terminal"] body::before{
    content:'';
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    pointer-events:none;
    z-index:9999;
    background:repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.35) 2px,
      rgba(0,0,0,0.35) 4px
    );
  }
  /* Phosphor glow on text */
  html[data-scheme="terminal"] body{
    text-shadow: 0 0 6px rgba(0,255,65,0.5);
  }
  html[data-scheme="terminal"] h1,
  html[data-scheme="terminal"] h2,
  html[data-scheme="terminal"] h3{
    text-shadow: 0 0 12px rgba(0,255,65,0.8), 0 0 24px rgba(0,255,65,0.3);
  }
  html[data-scheme="terminal"] .genre-tag{
    text-shadow: 0 0 6px rgba(0,255,65,0.6);
    box-shadow: 0 0 6px rgba(0,255,65,0.15);
  }
  html[data-scheme="terminal"] .genre-tag:hover,
  html[data-scheme="terminal"] .genre-tag.active{
    box-shadow: 0 0 12px rgba(0,255,65,0.5), inset 0 0 8px rgba(0,255,65,0.1);
    text-shadow: 0 0 10px rgba(0,255,65,1);
  }
  html[data-scheme="terminal"] header,
  html[data-scheme="terminal"] .settings-drawer,
  html[data-scheme="terminal"] .vibe-bar,
  html[data-scheme="terminal"] .detail-panel{
    border-color:#003b0a;
  }
  html[data-scheme="terminal"] .detail-panel{
    box-shadow: 0 0 20px rgba(0,255,65,0.12);
  }
  html[data-scheme="terminal"] input{
    caret-color:#00ff41;
  }
  html[data-scheme="terminal"] input::placeholder{
    color:#006618;
  }
  /* Cursor blink on active genre */
  html[data-scheme="terminal"] .genre-tag.active::after{
    content:'_';
    animation: termCursor .8s step-end infinite;
    margin-left:2px;
  }
  @keyframes termCursor{ 0%,100%{opacity:1} 50%{opacity:0} }
  /* CRT flicker — subtle */
  @keyframes crtFlicker{
    0%{opacity:1} 92%{opacity:1} 93%{opacity:.97} 94%{opacity:1} 97%{opacity:.98} 100%{opacity:1}
  }
  html[data-scheme="terminal"] body{
    animation: crtFlicker 8s infinite;
    background-color:#000;
  }
  /* Vignette */
  html[data-scheme="terminal"] body::after{
    content:'';
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    pointer-events:none;
    z-index:9998;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
  }
  /* Family headers in terminal */
  html[data-scheme="terminal"] .family-header{
    letter-spacing:.25em;
  }
  html[data-scheme="terminal"] .family-header::before{
    content:'> ';
    opacity:.7;
  }


  /* Retro gets a subtle warm grain on the body */
  html[data-scheme="retro"] body{
    background-image: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 58px,
      rgba(160,100,40,.07) 58px,
      rgba(160,100,40,.07) 60px
    );
  }

  /* ── FAMILY: curved L-stripe — concentric rounded rings, top+left only ──
     Each ring is a positioned box with border-radius, transparent right+bottom borders,
     and a small gap between rings achieved via inset offsets.
     family itself = ring 1 (outermost, darkest)
     ::before      = ring 2 (orange)
     ::after       = ring 3 (yellow)
     A 4th ::before on family-header fills as ring 4 (orange again)
     We then use a solid bg overlay to mask right+bottom sides of each ring.
  ── */
  html[data-scheme="retro"] .family{
    border: none !important;
    position: relative;
    margin: 18px 0 18px 18px;
    padding-left: 22px;
    padding-top: 22px;
    overflow: visible;
  }
  /* Ring 1 — outermost — dark red */
  html[data-scheme="retro"] .family > *{
    position: relative;
    z-index: 2;
  }
  html[data-scheme="retro"] .family-header,
  html[data-scheme="retro"] .family-body{
    position: relative;
    z-index: 2;
  }

  /* We draw the rings on a dedicated wrapper inserted via JS — 
     but since we can't easily do that, we use box-shadow on ::before and ::after
     with the trick of only showing top-left via clip-path on the shadow donor.
     
     Actually: draw each ring as an absolutely positioned div-like pseudo
     using border with border-radius and transparent right+bottom.
     Stack them with different insets. */

  /* rings injected via JS as .retro-ring elements */
  html[data-scheme="retro"] .retro-ring{
    position: absolute;
    border-radius: 10px;
    border-top-width: 3px;
    border-left-width: 3px;
    border-top-style: solid;
    border-left-style: solid;
    border-right: none;
    border-bottom: none;
    pointer-events: none;
    z-index: 1;
  }

  /* ── GENRE TAGS: simple flat warm border, no stripe (stripe is on family) ── */
  html[data-scheme="retro"] .genre{
    border: 2px solid currentColor !important;
    letter-spacing: .1em;
    background: var(--surface);
    font-family: 'DM Mono', monospace;
  }
  html[data-scheme="retro"] .genre:hover{
    background: var(--surface2);
  }

  html[data-scheme="retro"] .family-header{
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 2;
  }
  html[data-scheme="retro"] .family-body{
    position: relative;
    z-index: 2;
    overflow: visible;
  }
  html[data-scheme="retro"] .family.collapsed .family-body{
    overflow: hidden;
    max-height: 0;
  }
  html[data-scheme="retro"] .family-title{
    position: relative;
    z-index: 2;
  }
  html[data-scheme="retro"] header h1{
    letter-spacing: .06em;
  }
  html[data-scheme="retro"] .genres{
    gap: 8px;
    overflow: visible;
    position: relative;
    z-index: 2;
  }
  html[data-scheme="retro"] .cluster{
    position: relative;
    z-index: 2;
  }
  /* Neon gets scanlines */
  html[data-scheme="neon"] body{
    background-image: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,255,200,.015) 3px,
      rgba(0,255,200,.015) 4px
    );
  }
  html[data-scheme="neon"] .genre{
    text-shadow: 0 0 8px currentColor;
    border-style: solid;
  }
  html[data-scheme="neon"] header h1{
    text-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent);
  }
  html[data-scheme="neon"][data-theme="light"] header h1{
    color: #0a0a30;
    text-shadow: none;
  }
  /* Pastel gets a very soft paper texture */
  html[data-scheme="pastel"] .genre{
    border-style: dashed;
    border-width: 1px;
  }
  /* Mono gets sharp edges */
  html[data-scheme="mono"] .genre{
    border-radius: 0;
  }
  html[data-scheme="mono"] header h1{
    color: #ffffff;
  }

  /* ── NEON: Black void, screaming neon on everything ── */
  html[data-scheme="neon"]{
    --accent:#00ffcc;
    --rock:#ff2055;
    --electronic:#00cfff;
    --hiphop:#d400ff;
    --jazz:#ffaa00;
    --folk:#00ff77;
    --classical:#f0ff44;
    --rnb:#ff0077;
    --world:#00ffaa;
    --metal:#ff4400;
    --experimental:#88ffff;
    --pop:#ff55cc;
  }
  html[data-scheme="neon"][data-theme="dark"]{
    --bg:#050508;
    --surface:#0a0a10;
    --surface2:#0f0f18;
    --border:#1a1a30;
    --border2:#252545;
    --text:#e8f0ff;
    --text2:#a0a8c8;
    --muted:#404868;
    --panel:#080810;
  }
  html[data-scheme="neon"][data-theme="light"]{
    --bg:#f0f0ff;
    --surface:#ffffff;
    --surface2:#e4e4f8;
    --border:#c0c0e0;
    --border2:#a0a0cc;
    --text:#080820;
    --text2:#303060;
    --muted:#8080b0;
    --panel:#ffffff;
  }

  /* ── PASTEL: Warm cream paper, soft muted tones — like corkboard sketches ── */
  html[data-scheme="pastel"]{
    --accent:#d4924a;
    --rock:#d4806a;
    --electronic:#7aaed4;
    --hiphop:#b090c8;
    --jazz:#d4a060;
    --folk:#7ab878;
    --classical:#d4c068;
    --rnb:#d48080;
    --world:#60b8a8;
    --metal:#c86060;
    --experimental:#9090a0;
    --pop:#d488a8;
  }
  html[data-scheme="pastel"][data-theme="light"]{
    --bg:#faf6f0;
    --surface:#fff9f3;
    --surface2:#f0ebe3;
    --border:#ddd4c8;
    --border2:#ccc0b0;
    --text:#2e2418;
    --text2:#6e5a48;
    --muted:#b0a090;
    --panel:#fff9f3;
  }
  html[data-scheme="pastel"][data-theme="dark"]{
    --bg:#1e1a18;
    --surface:#262220;
    --surface2:#2e2826;
    --border:#4a4038;
    --border2:#605448;
    --text:#f0e8e0;
    --text2:#c0a898;
    --muted:#706050;
    --panel:#222018;
  }

  /* ── MONO: Pure black and white, stark editorial ── */
  html[data-scheme="mono"]{
    --accent:#888888;
    --rock:#e8e8e8;
    --electronic:#d8d8d8;
    --hiphop:#c8c8c8;
    --jazz:#f0f0f0;
    --folk:#d8d8d8;
    --classical:#e8e8e8;
    --rnb:#c8c8c8;
    --world:#d8d8d8;
    --metal:#b8b8b8;
    --experimental:#a8a8a8;
    --pop:#e0e0e0;
  }
  html[data-scheme="mono"][data-theme="dark"]{
    --bg:#080808;
    --surface:#111111;
    --surface2:#1a1a1a;
    --border:#282828;
    --border2:#363636;
    --text:#f0f0f0;
    --text2:#a0a0a0;
    --muted:#505050;
    --panel:#111111;
  }
  html[data-scheme="mono"][data-theme="light"]{
    --bg:#f8f8f8;
    --surface:#ffffff;
    --surface2:#eeeeee;
    --border:#cccccc;
    --border2:#bbbbbb;
    --text:#111111;
    --text2:#555555;
    --muted:#999999;
    --panel:#ffffff;
    --rock:#444444;
    --electronic:#333333;
    --hiphop:#555555;
    --jazz:#222222;
    --folk:#444444;
    --classical:#333333;
    --rnb:#555555;
    --world:#444444;
    --metal:#666666;
    --experimental:#777777;
    --pop:#444444;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;min-height:100vh;padding:0 0 180px;}
  header{padding:48px 40px 32px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,8vw,88px);letter-spacing:.04em;line-height:.9;color:var(--accent);}
  header p{color:var(--muted);font-size:11px;letter-spacing:.12em;text-transform:uppercase;margin-top:6px;}
  .legend{display:flex;flex-wrap:wrap;gap:12px 24px;padding:20px 40px;border-bottom:1px solid var(--border);}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:color .2s;}
  .legend-item:hover{color:var(--text);}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .filter-active .legend-item{opacity:.3;}
  .filter-active .legend-item.active{opacity:1;color:var(--text);}
  .search-bar{padding:16px 40px;border-bottom:1px solid var(--border);}
  .search-bar input{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:10px 16px;width:100%;max-width:400px;outline:none;transition:border-color .2s;letter-spacing:.05em;}
  .search-bar input:focus{border-color:var(--accent);}
  .search-bar input::placeholder{color:var(--muted);}
  .families{padding:40px;display:flex;flex-direction:column;gap:2px;}
  .family{border-left:3px solid transparent;transition:border-color .2s;}
  .family-header{display:flex;align-items:baseline;gap:16px;padding:18px 0 12px;cursor:pointer;user-select:none;border-bottom:1px solid var(--border);}
  .family-header:hover .family-title{opacity:.7;}
  .family-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.06em;transition:opacity .2s;}
  .family-themes{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);flex:1;}
  .family-toggle{font-size:18px;color:var(--muted);margin-left:auto;transition:transform .3s;}
  .family.collapsed .family-toggle{transform:rotate(-90deg);}
  .family-body{overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1);max-height:4000px;}
  .family.collapsed .family-body{max-height:0;}
  .cluster{padding:20px 0 8px 20px;border-left:1px solid var(--border);margin:12px 0 4px 0;}
  .cluster-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
  .genres{display:flex;flex-wrap:wrap;gap:6px;}
  .genre{padding:5px 12px;border:1px solid;font-size:11px;letter-spacing:.08em;cursor:pointer;transition:all .15s;}
  .genre:hover{filter:brightness(1.3);transform:translateY(-1px);}
  .genre.dim{opacity:.12;}
  .genre.active-sel{filter:brightness(1.5);outline:1px solid currentColor;outline-offset:2px;}
  /* detail panel */
  .detail-panel{position:fixed;bottom:0;left:0;right:0;background:var(--panel,#131313);border-top:2px solid var(--border);padding:20px 40px 24px;display:grid;grid-template-columns:170px 1fr 1fr 1fr 1fr auto;gap:0 24px;align-items:start;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:100;}
  .detail-panel.visible{transform:translateY(0);}
  .detail-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.06em;line-height:1.1;padding-top:2px;}
  .detail-col-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
  .detail-col-val{font-size:11px;line-height:1.7;color:var(--text);}
  .detail-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 0 0 8px;font-family:'DM Mono',monospace;align-self:start;}
  .detail-close:hover{color:var(--text);}
  .artist-tag{display:inline-block;padding:2px 8px;border:1px solid;font-size:10px;margin:2px 3px 0 0;letter-spacing:.06em;text-decoration:none;transition:filter .15s,background .15s;}
  .artist-tag:hover{filter:brightness(1.4);background:rgba(255,255,255,.05);}
  @media(max-width:700px){
    header,.legend,.search-bar,.families{padding-left:20px;padding-right:20px;}
    .detail-panel{grid-template-columns:1fr 1fr;padding:16px 20px 20px;gap:14px 16px;max-height:58vh;overflow-y:auto;}
    .detail-name{grid-column:1/-1;}
    .detail-close{position:absolute;top:14px;right:20px;}
  }

  /* ── THEME TRANSITIONS ── */
  body{transition:background .25s,color .25s;}
  .detail-panel{transition:transform .3s cubic-bezier(.4,0,.2,1),background .25s;}

  /* ── SETTINGS BUTTON ── */
  .settings-btn{background:none;border:1px solid var(--border2,#333);color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;padding:7px 14px;cursor:pointer;text-transform:uppercase;transition:all .2s;white-space:nowrap;}
  .settings-btn:hover{border-color:var(--accent);color:var(--accent);}

  /* ── HEADER LAYOUT ── */
  header{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;}
  .header-left{}

  /* ── SETTINGS DRAWER ── */
  .settings-drawer{background:var(--surface);border-bottom:1px solid var(--border);padding:0 40px;max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1),padding .35s;}
  .settings-drawer.open{max-height:200px;padding:22px 40px;}
  .settings-inner{display:flex;gap:40px;flex-wrap:wrap;}
  .settings-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
  .settings-options{display:flex;gap:8px;flex-wrap:wrap;}
  .sopt{background:none;border:1px solid var(--border2,#333);color:var(--text2,#b0a898);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.08em;padding:5px 13px;cursor:pointer;transition:all .15s;}
  .sopt:hover{border-color:var(--accent);color:var(--accent);}
  .sopt.active{border-color:var(--accent);color:var(--accent);}
  .scheme-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle;}

  /* ── VIBE BAR ── */
  .vibe-bar{padding:14px 40px;border-bottom:1px solid var(--border);background:var(--surface2,#181818);}
  .vibe-bar-inner{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .vibe-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
  .vibe-input-wrap{position:relative;flex:1;max-width:360px;}
  .vibe-input-wrap input{background:var(--surface);border:1px solid var(--border2,#333);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:8px 14px;width:100%;outline:none;transition:border-color .2s;letter-spacing:.04em;}
  .vibe-input-wrap input:focus{border-color:var(--accent);}
  .vibe-input-wrap input::placeholder{color:var(--muted);}
  .vibe-sugs{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border2,#333);border-top:none;z-index:200;display:none;}
  .vibe-sugs.show{display:block;}
  .vibe-sug-item{padding:7px 14px;cursor:pointer;font-size:11px;color:var(--text2,#b0a898);letter-spacing:.05em;transition:background .1s;}
  .vibe-sug-item:hover{background:var(--surface2,#181818);color:var(--text);}
  .vibe-results{margin-top:10px;display:none;flex-wrap:wrap;gap:6px;align-items:center;}
  .vibe-results.show{display:flex;}
  .vibe-result-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-right:4px;}

// flat genre map for vibe lookups
const GENRE_MAP = {};
DATA.forEach(fam => {
  fam.clusters.forEach(cl => {
    cl.genres.forEach(g => {
      GENRE_MAP[g.name] = {g, color: fam.color};
    });
  });
});

// ── SETTINGS ──
document.getElementById("settings-toggle").addEventListener("click", () => {
  document.getElementById("settings-drawer").classList.toggle("open");
});
document.querySelectorAll("[data-mode]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.documentElement.setAttribute("data-theme", btn.dataset.mode);
    document.querySelectorAll("[data-mode]").forEach(b => b.classList.toggle("active", b===btn));
  });
});
document.querySelectorAll("[data-scheme]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.documentElement.setAttribute("data-scheme", btn.dataset.scheme);
    document.querySelectorAll("[data-scheme]").forEach(b => b.classList.toggle("active", b===btn));
  });
});

// ── VIBE SEARCH ──
const vibeInput = document.getElementById("vibe-input");
const vibeSugsEl = document.getElementById("vibe-sugs");
const vibeResultsEl = document.getElementById("vibe-results");
const vibeClearBtn = document.getElementById("vibe-clear");

vibeInput.addEventListener("input", () => {
  const q = vibeInput.value.toLowerCase().trim();
  if (!q) { vibeSugsEl.classList.remove("show"); return; }
  const hits = VIBE_KEYS.filter(k => k.includes(q)).slice(0, 8);
  if (!hits.length) { vibeSugsEl.classList.remove("show"); return; }
  vibeSugsEl.innerHTML = hits.map(k => `<div class="vibe-sug-item" data-key="${k}">${k}</div>`).join("");
  vibeSugsEl.classList.add("show");
});
vibeSugsEl.addEventListener("click", e => {
  const item = e.target.closest(".vibe-sug-item");
  if (!item) return;
  vibeInput.value = item.dataset.key;
  vibeSugsEl.classList.remove("show");
  runVibeSearch(item.dataset.key);
});
vibeInput.addEventListener("keydown", e => {
  if (e.key === "Enter") { vibeSugsEl.classList.remove("show"); runVibeSearch(vibeInput.value.toLowerCase().trim()); }
});
document.addEventListener("click", e => { if (!e.target.closest(".vibe-input-wrap")) vibeSugsEl.classList.remove("show"); });

vibeClearBtn.addEventListener("click", () => {
  vibeInput.value = "";
  vibeResultsEl.innerHTML = '<span class="vibe-result-label">Matches →</span>';
  vibeResultsEl.classList.remove("show");
  vibeClearBtn.style.display = "none";
  document.querySelectorAll(".genre").forEach(g => g.classList.remove("dim"));
});

function runVibeSearch(key) {
  if (!key) return;
  let genres = VIBES[key];
  if (!genres) {
    const partial = Object.keys(VIBES).find(k => k.includes(key) || key.includes(k));
    if (partial) genres = VIBES[partial];
  }
  vibeClearBtn.style.display = "inline";
  if (!genres) {
    vibeResultsEl.innerHTML = '<span class="vibe-result-label">No match — try: fallout, space, heartbreak, 80s, goth</span>';
    vibeResultsEl.classList.add("show");
    return;
  }
  let html = '<span class="vibe-result-label">Genres for "' + key + '" →</span>';
  genres.forEach(n => {
    const entry = GENRE_MAP[n];
    const color = entry ? entry.color : "var(--accent)";
    html += `<span class="vibe-match" style="border-color:${color};color:${color}" data-genre="${n}">${n}</span>`;
  });
  vibeResultsEl.innerHTML = html;
  vibeResultsEl.classList.add("show");
  document.querySelectorAll(".family").forEach(f => f.classList.remove("collapsed"));
  const nameSet = new Set(genres.map(n => n.toLowerCase()));
  document.querySelectorAll(".genre").forEach(g => {
    const match = nameSet.has(g.dataset.name);
    g.classList.toggle("dim", !match);
    if (match) { g.classList.add("vibe-highlight"); setTimeout(()=>g.classList.remove("vibe-highlight"),600); }
  });
  vibeResultsEl.querySelectorAll(".vibe-match").forEach(chip => {
    chip.addEventListener("click", () => {
      const entry = GENRE_MAP[chip.dataset.genre];
      if (!entry) return;
      if (selectedGenreEl) selectedGenreEl.classList.remove("active-sel");
      document.querySelectorAll(".genre").forEach(g => {
        if (g.dataset.name === chip.dataset.genre.toLowerCase()) { selectedGenreEl = g; g.classList.add("active-sel"); }
      });
      showDetail(entry.g.name, entry.g.themes, entry.g.sound, entry.g.artists, entry.g.close, entry.g.era, entry.color);
    });
  });
}

// Build legend
const legend=document.getElementById("legend");
DATA.forEach(fam=>{
  const item=document.createElement("div");
  item.className="legend-item";
  item.dataset.id=fam.id;
  item.innerHTML=`<div class="legend-dot" style="background:${fam.color}"></div>${fam.name}`;
  item.addEventListener("click",()=>toggleFilter(fam.id));
  legend.appendChild(item);
});

const familiesEl=document.getElementById("families");
let activeFilter=null,selectedGenreEl=null;

DATA.forEach(fam=>{
  const famEl=document.createElement("div");
  famEl.className="family collapsed";
  famEl.dataset.id=fam.id;
  famEl.style.borderColor=fam.color;

  const header=document.createElement("div");
  header.className="family-header";
  header.innerHTML=`<span class="family-title" style="color:${fam.color}">${fam.name}</span><span class="family-themes">${fam.mainThemes.join(" · ")}</span><span class="family-toggle">▾</span>`;
  header.addEventListener("click",()=>famEl.classList.toggle("collapsed"));

  const body=document.createElement("div");
  body.className="family-body";

  fam.clusters.forEach(cluster=>{
    const clEl=document.createElement("div");
    clEl.className="cluster";
    clEl.innerHTML=`<div class="cluster-label">${cluster.label}</div>`;
    const genreRow=document.createElement("div");
    genreRow.className="genres";
    cluster.genres.forEach(g=>{
      const gEl=document.createElement("div");
      gEl.className="genre";
      gEl.dataset.name=g.name.toLowerCase();
      gEl.textContent=g.name;
      gEl.style.borderColor=fam.color;
      gEl.style.color=fam.color;
      gEl.addEventListener("click",(e)=>{
        e.stopPropagation();
        if(selectedGenreEl)selectedGenreEl.classList.remove("active-sel");
        selectedGenreEl=gEl;
        gEl.classList.add("active-sel");
        showDetail(g.name,g.themes,g.sound,g.artists,g.close,g.era,fam.color);
      });
      genreRow.appendChild(gEl);
    });
    clEl.appendChild(genreRow);
    body.appendChild(clEl);
  });
  famEl.appendChild(header);
  famEl.appendChild(body);
  familiesEl.appendChild(famEl);
});

// Inject retro stripe rings into each family when retro scheme is active
function injectRetroRings() {
  document.querySelectorAll('.retro-ring').forEach(r => r.remove());
  if (document.documentElement.getAttribute('data-scheme') !== 'retro') return;
  // ring definitions: [inset-from-edge-px, color]
  const rings = [
    [0,  '#7a1500'],
    [4,  '#c44a00'],
    [8,  '#f0be00'],
  ];
  document.querySelectorAll('.family').forEach(fam => {
    rings.forEach(([offset, color]) => {
      const ring = document.createElement('div');
      ring.className = 'retro-ring';
      ring.style.top    = offset + 'px';
      ring.style.left   = offset + 'px';
      ring.style.right  = '0';
      ring.style.bottom = '0';
      ring.style.borderColor = color;
      ring.style.borderRadius = (10 - offset * 0.3) + 'px';
      fam.appendChild(ring);
    });
  });
}

// Run on load and whenever scheme changes
injectRetroRings();
document.querySelectorAll('[data-scheme]').forEach(btn => {
  btn.addEventListener('click', () => setTimeout(injectRetroRings, 10));
});

function toggleFilter(id){
  const items=document.querySelectorAll(".legend-item");
  const families=document.querySelectorAll(".family");
  if(activeFilter===id){
    activeFilter=null;
    legend.classList.remove("filter-active");
    items.forEach(i=>i.classList.remove("active"));
    families.forEach(f=>f.style.display="");
  } else {
    activeFilter=id;
    legend.classList.add("filter-active");
    items.forEach(i=>i.classList.toggle("active",i.dataset.id===id));
    families.forEach(f=>f.style.display=f.dataset.id===id?"":"none");
  }
}

document.getElementById("search").addEventListener("input",function(){
  const q=this.value.toLowerCase().trim();
  document.querySelectorAll(".genre").forEach(g=>g.classList.toggle("dim",q&&!g.dataset.name.includes(q)));
  if(q)document.querySelectorAll(".family").forEach(f=>f.classList.remove("collapsed"));
});

const panel=document.getElementById("detail");
const dName=document.getElementById("d-name");
const dThemes=document.getElementById("d-themes");
const dSound=document.getElementById("d-sound");
const dArtists=document.getElementById("d-artists");
const dClose=document.getElementById("d-close");
const dEra=document.getElementById("d-era");

function showDetail(name,themes,sound,artists,close,era,color){
  dName.textContent=name;
  dName.style.color=color;
  dThemes.textContent=themes;
  dSound.textContent=sound;
  dArtists.innerHTML=artists.map(a=>`<a class="artist-tag" href="${yt(a)}" target="_blank" rel="noopener" style="border-color:${color};color:${color}">${a}</a>`).join("");
  dClose.textContent=close;
  dEra.textContent=era;
  panel.classList.add("visible");
}

document.getElementById("d-close-btn").addEventListener("click",()=>{
  panel.classList.remove("visible");
  if(selectedGenreEl){selectedGenreEl.classList.remove("active-sel");selectedGenreEl=null;}
});
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){
    panel.classList.remove("visible");
    if(selectedGenreEl){selectedGenreEl.classList.remove("active-sel");selectedGenreEl=null;}
  }
});
</script>
